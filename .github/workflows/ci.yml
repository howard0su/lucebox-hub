name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-dflash:
    name: Build dflash (CUDA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '12.8.0'
          method: network
          sub-packages: '["nvcc", "thrust", "cuda-cudart"]'

      - name: Configure & build
        run: |
          cd dflash
          cmake -B build \
            -DCMAKE_CUDA_ARCHITECTURES="75;86" \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)

  build-megakernel:
    name: Build megakernel (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [sm_75, sm_86]
    steps:
      - uses: actions/checkout@v4

      - uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '12.8.0'
          method: network
          sub-packages: '["nvcc", "thrust", "cuda-cudart"]'
          log-file-suffix: '${{ matrix.arch }}.txt'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install torch --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Build extension
        env:
          MEGAKERNEL_CUDA_ARCH: ${{ matrix.arch }}
        run: |
          cd megakernel
          python3 setup.py build_ext --inplace
