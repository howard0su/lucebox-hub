name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build-dflash:
    name: Build dflash (CUDA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Start CUDA container
        run: |
          docker run -d --name builder \
            -v ${{ github.workspace }}:${{ github.workspace }} \
            -w ${{ github.workspace }} \
            nvidia/cuda:12.8.0-devel-ubuntu22.04 sleep infinity
          docker exec builder apt-get update
          docker exec builder apt-get install -y --no-install-recommends cmake g++

      - name: Configure & build
        run: |
          docker exec builder bash -c "\
            cd dflash && \
            cmake -B build \
              -DCMAKE_CUDA_ARCHITECTURES='75;86' \
              -DCMAKE_BUILD_TYPE=Release && \
            cmake --build build -j\$(nproc)"

  build-megakernel:
    name: Build megakernel (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [sm_75, sm_86]
    steps:
      - uses: actions/checkout@v4

      - name: Start CUDA container
        run: |
          docker run -d --name builder \
            -v ${{ github.workspace }}:${{ github.workspace }} \
            -w ${{ github.workspace }} \
            nvidia/cuda:12.8.0-devel-ubuntu22.04 sleep infinity
          docker exec builder apt-get update
          docker exec builder apt-get install -y --no-install-recommends python3 python3-pip g++
          docker exec builder pip3 install --break-system-packages torch --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Build extension
        run: |
          docker exec -e MEGAKERNEL_CUDA_ARCH=${{ matrix.arch }} builder bash -c "\
            cd megakernel && \
            python3 setup.py build_ext --inplace"
