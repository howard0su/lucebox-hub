<svg viewBox="0 0 1400 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Lucebox — open optimization for local AI">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#f5c842" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#f5c842" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#f5c842" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="edge" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#f5c842" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#f5c842" stop-opacity="1"/>
      <stop offset="1" stop-color="#f5c842" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="420" fill="#090909"/>
  <rect width="1400" height="420" fill="url(#grid)"/>
  <ellipse cx="700" cy="210" rx="560" ry="220" fill="url(#glow)"/>

  <g font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', ui-monospace, monospace">
    <text x="700" y="185" font-size="128" font-weight="800" letter-spacing="14"
          fill="#e8e8ed" text-anchor="middle">LUCEBOX</text>
    <line x1="460" y1="216" x2="940" y2="216" stroke="url(#edge)" stroke-width="1.5"/>
    <text x="700" y="258" font-size="20" letter-spacing="8"
          fill="#f5c842" text-anchor="middle">OPEN OPTIMIZATION · FOR LOCAL AI</text>
    <text x="700" y="300" font-size="15" letter-spacing="3"
          fill="#8888a0" text-anchor="middle">kernels · quantization · benchmarks</text>
  </g>

  <g stroke="#222222" stroke-width="1" fill="none">
    <path d="M 120 340 L 220 340 L 240 360 L 380 360"/>
    <path d="M 1280 340 L 1180 340 L 1160 360 L 1020 360"/>
  </g>
  <g fill="#f5c842">
    <circle cx="120" cy="340" r="3.5"/>
    <circle cx="380" cy="360" r="3.5"/>
    <circle cx="1280" cy="340" r="3.5"/>
    <circle cx="1020" cy="360" r="3.5"/>
  </g>

  <g font-family="'SF Mono', ui-monospace, monospace" font-size="11" fill="#55556a" letter-spacing="2">
    <text x="40" y="40">v0.1</text>
    <text x="1360" y="40" text-anchor="end">MIT</text>
    <text x="40" y="395">LUCE-ORG / LUCEBOX</text>
    <text x="1360" y="395" text-anchor="end">lucebox.com</text>
  </g>
</svg>
