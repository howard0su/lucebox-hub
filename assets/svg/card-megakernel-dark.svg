<svg viewBox="0 0 560 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Megakernel — all 24 layers in one CUDA dispatch">
  <defs>
    <linearGradient id="mk-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f0f0f"/>
      <stop offset="1" stop-color="#090909"/>
    </linearGradient>
    <linearGradient id="mk-glow" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f5c842" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#f5c842" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="560" height="320" rx="12" fill="url(#mk-bg)" stroke="#222222" stroke-width="1"/>
  <rect x="1" y="1" width="558" height="140" rx="12" fill="url(#mk-glow)"/>

  <g font-family="'SF Mono', ui-monospace, monospace" fill="#f5c842" font-size="10" letter-spacing="2">
    <text x="28" y="42">PROJECT · 01</text>
  </g>

  <g font-family="'SF Mono', ui-monospace, monospace">
    <text x="28" y="88" font-size="34" font-weight="800" fill="#e8e8ed" letter-spacing="1">Megakernel</text>
    <text x="28" y="118" font-size="13" fill="#8888a0">All 24 layers of Qwen 3.5-0.8B in a single CUDA dispatch.</text>
  </g>

  <g stroke="#222222" stroke-width="1">
    <line x1="28" y1="152" x2="532" y2="152"/>
  </g>

  <g font-family="'SF Mono', ui-monospace, monospace" font-size="12" fill="#e8e8ed">
    <text x="28" y="184" fill="#55556a">tok/s decode</text>
    <text x="28" y="208" font-weight="700" font-size="24">413</text>
    <text x="98" y="208" font-size="12" fill="#8888a0">@220W · RTX 3090</text>

    <text x="28" y="246" fill="#55556a">tok/J</text>
    <text x="28" y="270" font-weight="700" font-size="24" fill="#f5c842">1.87</text>
    <text x="98" y="270" font-size="12" fill="#8888a0">vs Apple M5 Max · 1.76</text>
  </g>

  <g stroke="#f5c842" stroke-width="1" fill="none" opacity="0.6">
    <line x1="320" y1="182" x2="520" y2="182"/>
    <line x1="320" y1="198" x2="470" y2="198"/>
    <line x1="320" y1="214" x2="380" y2="214"/>
  </g>
  <g fill="#55556a" font-family="'SF Mono', ui-monospace, monospace" font-size="9" letter-spacing="2">
    <text x="320" y="176">3.4× PREFILL</text>
    <text x="320" y="232" fill="#55556a">1.55× DECODE</text>
  </g>

  <g fill="#55556a" font-family="'SF Mono', ui-monospace, monospace" font-size="9" letter-spacing="2">
    <text x="28" y="300">KERNEL · CUDA · BF16 · 82 BLOCKS</text>
    <text x="532" y="300" text-anchor="end" fill="#f5c842">READ →</text>
  </g>
