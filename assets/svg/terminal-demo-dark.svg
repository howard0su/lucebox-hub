<svg viewBox="0 0 900 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Lucebox terminal demo">
  <rect width="900" height="360" rx="10" fill="#0f0f0f" stroke="#222222"/>
  <rect x="0" y="0" width="900" height="34" rx="10" fill="#161616"/>
  <rect x="0" y="24" width="900" height="10" fill="#161616"/>
  <g>
    <circle cx="20" cy="17" r="6" fill="#3a3a3a"/>
    <circle cx="40" cy="17" r="6" fill="#3a3a3a"/>
    <circle cx="60" cy="17" r="6" fill="#3a3a3a"/>
  </g>
  <text x="450" y="21" font-family="'SF Mono', ui-monospace, monospace" font-size="11"
        fill="#55556a" text-anchor="middle" letter-spacing="2">lucebox · qwen 3.5-0.8B · rtx 3090</text>

  <g font-family="'SF Mono', ui-monospace, monospace" font-size="14">
    <text x="24" y="72" fill="#55556a">$</text>
    <text x="44" y="72" fill="#e8e8ed">pip install</text>
    <text x="140" y="72" fill="#f5c842"> lucebox-megakernel</text>

    <text x="24" y="100" fill="#55556a">$</text>
    <text x="44" y="100" fill="#e8e8ed">python -m lucebox.bench</text>
    <text x="262" y="100" fill="#8888a0">--model qwen3.5-0.8B --power 220</text>

    <text x="24" y="134" fill="#55556a">▸</text>
    <text x="44" y="134" fill="#8888a0">loading weights</text>
    <text x="44" y="154" fill="#8888a0">compiling kernel</text>
    <text x="44" y="174" fill="#8888a0">warming up</text>
  </g>

  <g font-family="'SF Mono', ui-monospace, monospace" font-size="13">
    <rect x="24" y="196" width="852" height="1" fill="#222222"/>
    <text x="24" y="222" fill="#55556a">metric</text>
    <text x="360" y="222" fill="#55556a">megakernel</text>
    <text x="520" y="222" fill="#55556a">llama.cpp</text>
    <text x="680" y="222" fill="#55556a">Δ</text>

    <text x="24" y="250" fill="#e8e8ed">prefill pp520</text>
    <text x="360" y="250" fill="#f5c842" font-weight="700">37,800 tok/s</text>
    <text x="520" y="250" fill="#8888a0">11,247 tok/s</text>
    <text x="680" y="250" fill="#f5c842">3.36×</text>

    <text x="24" y="278" fill="#e8e8ed">decode tg128</text>
    <text x="360" y="278" fill="#f5c842" font-weight="700">413 tok/s</text>
    <text x="520" y="278" fill="#8888a0">267 tok/s</text>
    <text x="680" y="278" fill="#f5c842">1.55×</text>

    <text x="24" y="306" fill="#e8e8ed">tok/J @220W</text>
    <text x="360" y="306" fill="#f5c842" font-weight="700">1.87</text>
    <text x="520" y="306" fill="#8888a0">0.76 @350W</text>
    <text x="680" y="306" fill="#f5c842">2.46×</text>

    <rect x="24" y="326" width="852" height="1" fill="#222222"/>
  </g>

  <g font-family="'SF Mono', ui-monospace, monospace" font-size="11" letter-spacing="2" fill="#55556a">
    <text x="24" y="350">ok · 20 timed runs · bf16</text>
    <text x="876" y="350" text-anchor="end" fill="#f5c842">■ beats apple m5 max at 2× throughput</text>
  </g>
</svg>
